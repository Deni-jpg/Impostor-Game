<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Sala - Jogo do Impostor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>🕵</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="module" src="dynatrace.js"></script>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4598537233275211" crossorigin="anonymous"></script>

  <script>
  (function () {
    var webSdkScript = document.createElement("script");
    webSdkScript.src = "https://unpkg.com/@grafana/faro-web-sdk@2/dist/bundle/faro-web-sdk.iife.js";

    webSdkScript.onload = () => {
      window.GrafanaFaroWebSdk.initializeFaro({
        url: "https://faro-collector-prod-eu-west-6.grafana.net/collect/3c7f5c47596b8850d0d08f46b95fce19",
        app: {
          name: "jogodogc",
          version: "1.0.0",
          environment: "production",
        },
      });

      var webTracingScript = document.createElement("script");
      webTracingScript.src = "https://unpkg.com/@grafana/faro-web-tracing@2/dist/bundle/faro-web-tracing.iife.js";

      webTracingScript.onload = () => {
        window.GrafanaFaroWebSdk.faro.instrumentations.add(
          new window.GrafanaFaroWebTracing.TracingInstrumentation()
        );
      };
      document.head.appendChild(webTracingScript);
    };
    document.head.appendChild(webSdkScript);
  })();
  </script>

  <script type="module">
    import { initializeOpenTelemetry, otelUtils } from './js/opentelemetry-init.js';
    initializeOpenTelemetry();
    window.otelUtils = otelUtils; // Exporta para o script de baixo
  </script>
</head>

<body class="bg-gray-900 text-gray-100 flex flex-col min-h-[100dvh]">

<main class="flex-grow flex flex-col items-center justify-center w-full max-w-md mx-auto px-4 py-8">
  <div class="w-full bg-gray-800 p-8 rounded-2xl shadow-lg text-center border border-gray-700">
    <h1 class="text-3xl font-bold mb-6 text-white">Criar Sala 🎮</h1>

    <form id="form-sala" class="space-y-5">
      <input type="text" id="Palavra" placeholder="Palavra secreta" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500" required>
      <input type="number" id="Quantidade" placeholder="Número de jogadores" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500" min="4" required>
      <input type="number" id="Impostores" placeholder="Número de impostores" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500" min="1" required>
      <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition shadow-lg">
        Avançar para o Lobby 🚪
      </button>
    </form>

    <div id="sala-info" class="mt-6 hidden">
      <p class="mb-2 text-xl">Código da Sala: <span id="codigo-sala" class="font-bold text-yellow-400"></span></p>
      <p class="mb-2 text-gray-300">Jogadores que entraram:</p>
      <ul id="lista-jogadores" class="mb-4 list-disc list-inside text-left bg-gray-700 p-3 rounded-lg min-h-[50px]"></ul>

      <div class="space-y-2">
        <button id="atualizar-btn" class="w-full py-2 bg-green-600 hover:bg-green-700 rounded-lg text-white font-semibold shadow-md transition">
          Atualizar lista 🆕
        </button>
        <button id="excluir-btn" class="w-full py-2 bg-red-600 hover:bg-red-800 rounded-lg text-white font-semibold shadow-md transition">
          Excluir Sala 🗑️
        </button>
      </div>
    </div>
  </div>
</main>

<footer class="w-full py-6 border-t border-gray-800 text-center">
  <div class="flex flex-col items-center gap-2">
    <p class="text-gray-500 text-xs">&copy; 2026 Jogo do Impostor - Diversão entre amigos.</p>
    <div class="flex gap-4">
      <a href="index.html" class="text-blue-400 hover:text-white text-xs transition">Início</a>
      <a href="privacidade.html" class="text-blue-400 hover:text-white text-xs transition border-l border-gray-700 pl-4">Política de Privacidade</a>
    </div>
  </div>
</footer>

<script type="module">
  import { supabase } from './js/supabaseClient.js';

  const form           = document.getElementById("form-sala");
  const salaInfo       = document.getElementById("sala-info");
  const codigoSpan     = document.getElementById("codigo-sala");
  const listaJogadores = document.getElementById("lista-jogadores");
  const atualizarBtn   = document.getElementById("atualizar-btn");
  const excluirBtn     = document.getElementById("excluir-btn");

  let salaCode;
  let palavraSala;

  function mostrarLobby() {
    form.style.display = "none";
    salaInfo.classList.remove("hidden");
    codigoSpan.textContent = salaCode;
  }

  function mostrarForm() {
    salaInfo.classList.add("hidden");
    form.style.display = "";
  }

  async function atualizarLista() {
    if (!salaCode) return;
    const { data, error } = await supabase
      .from('jogadores').select('*').eq('codigo_sala', salaCode).order('id', { ascending: true });
    if (error) { 
      console.log(error); 
      // Enviando erro para o seu Docker Local
      window.otelUtils.recordError(error, { context: 'atualizar_lista' });
      return; 
    }

    listaJogadores.innerHTML = '';
    data.forEach(jogador => {
      const li = document.createElement("li");
      li.innerHTML = jogador.role === "impostor"
        ? `${jogador.nome} - <span class="text-red-500 font-bold">IMPOSTOR</span>`
        : `${jogador.nome} - <span class="text-blue-400 font-semibold">${palavraSala}</span>`;
      listaJogadores.appendChild(li);
    });
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const palavra    = document.getElementById("Palavra").value.trim();
    const quantidade = parseInt(document.getElementById("Quantidade").value);
    const impostores = parseInt(document.getElementById("Impostores").value);

    salaCode    = Math.random().toString(36).substring(2, 6).toUpperCase();
    palavraSala = palavra;

    // Criando a sala no Supabase
    const { error } = await supabase.from('salas').insert([{ codigo: salaCode, palavra, quantidade, impostores }]);
    
    if (error) { 
      alert("Erro ao criar sala: " + error.message); 
      // LOG LOCAL NO SEU DOCKER
      window.otelUtils.recordError(error, { action: 'create_room' });
      return; 
    }

    // MANDANDO INFORMAÇÃO PRO SEU DOCKER LOCAL (Prometheus e Loki)
    window.otelUtils.incrementCounter('game_rooms_created_total');
    window.otelUtils.recordGameEvent('sala_criada', { codigo: salaCode });

    sessionStorage.setItem("mestre_sala",    salaCode);
    sessionStorage.setItem("mestre_palavra", palavraSala);

    mostrarLobby();
    await atualizarLista();
  });

  atualizarBtn.addEventListener("click", atualizarLista);

  excluirBtn.addEventListener("click", async () => {
    if (!salaCode) return;
    const confirma = confirm("Tem certeza que quer excluir a sala?");
    if (!confirma) return;

    await supabase.from('jogadores').delete().eq('codigo_sala', salaCode);
    await supabase.from('salas').delete().eq('codigo', salaCode);

    // Métrica de exclusão no Prometheus local
    window.otelUtils.incrementCounter('game_rooms_deleted_total');

    sessionStorage.removeItem("mestre_sala");
    sessionStorage.removeItem("mestre_palavra");
    salaCode    = null;
    palavraSala = null;

    mostrarForm();
  });

  async function init() {
    const salvoCode    = sessionStorage.getItem("mestre_sala");
    const salvoPalavra = sessionStorage.getItem("mestre_palavra");
    if (!salvoCode || !salvoPalavra) return;

    const { data: salaExiste } = await supabase
      .from('salas').select('codigo').eq('codigo', salvoCode).single();

    if (salaExiste) {
      salaCode    = salvoCode;
      palavraSala = salvoPalavra;
      mostrarLobby();
      await atualizarLista();
    } else {
      sessionStorage.removeItem("mestre_sala");
      sessionStorage.removeItem("mestre_palavra");
    }
  }

  init();
</script>

</body>
</html>
