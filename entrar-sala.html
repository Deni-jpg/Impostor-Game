<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar na Sala - Jogo do Impostor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>🕵</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="dynatrace.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4598537233275211" crossorigin="anonymous"></script>
  <script>
  (function () {
    var webSdkScript = document.createElement("script");

    // fetch the latest 2.x.x version of the Web-SDK from the CDN
    webSdkScript.src =
      "https://unpkg.com/@grafana/faro-web-sdk@2/dist/bundle/faro-web-sdk.iife.js";

    webSdkScript.onload = () => {
      window.GrafanaFaroWebSdk.initializeFaro({
        url: "https://faro-collector-prod-eu-west-6.grafana.net/collect/3c7f5c47596b8850d0d08f46b95fce19",
        app: {
          name: "jogodogc",
          version: "1.0.0",
          environment: "production",
        },
        
      });


      // Load instrumentations at the onLoad event of the web-SDK and after the above configuration.
      // This is important because we need to ensure that the Web-SDK has been loaded and initialized before we add further instruments!
      var webTracingScript = document.createElement("script");

      // fetch the latest 2.x.x version of the Web Tracing package from the CDN
      webTracingScript.src =
        "https://unpkg.com/@grafana/faro-web-tracing@2/dist/bundle/faro-web-tracing.iife.js";

      // Initialize, configure (if necessary) and add the the new instrumentation to the already loaded and configured Web-SDK.
      webTracingScript.onload = () => {
        window.GrafanaFaroWebSdk.faro.instrumentations.add(
          new window.GrafanaFaroWebTracing.TracingInstrumentation()
        );
      };

      // Append the Web Tracing script script tag to the HTML page
      document.head.appendChild(webTracingScript);
    };

    // Append the Web-SDK script script tag to the HTML page
    document.head.appendChild(webSdkScript);
  })();
</script>

</head>
<body class="bg-gray-900 text-gray-100 flex flex-col min-h-[100dvh]">

  <main class="flex-grow flex flex-col items-center justify-center w-full max-w-md mx-auto px-4 py-8">
    <div class="w-full bg-gray-800 p-8 rounded-2xl shadow-lg text-center border border-gray-700">
      <h1 class="text-3xl font-bold mb-6">Entrar na Sala 🔑</h1>

      <form id="form-join" class="space-y-5">
        <input type="text" id="nome" placeholder="Seu nome" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500" required>
        <input type="text" id="sala" placeholder="Código da sala" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500" required>
        <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition shadow-lg">
          Entrar 🚀
        </button>
      </form>

      <p class="mt-4 text-sm text-gray-500 italic">Peça o código para quem criou a sala.</p>
    </div>
  </main>

  <footer class="w-full py-6 border-t border-gray-800 text-center">
    <div class="flex flex-col items-center gap-2">
      <p class="text-gray-500 text-xs">&copy; 2026 Jogo do Impostor - Diversão entre amigos.</p>
      <div class="flex gap-4">
        <a href="index.html" class="text-blue-400 hover:text-white text-xs transition">Início</a>
        <a href="privacidade.html" class="text-blue-400 hover:text-white text-xs transition border-l border-gray-700 pl-4">Política de Privacidade</a>
      </div>
    </div>
  </footer>

  <script type="module">
    import { supabase } from './js/supabaseClient.js'

    const formJoin = document.getElementById("form-join");

    formJoin.addEventListener("submit", async function(e){
      e.preventDefault();
      const nome     = document.getElementById("nome").value.trim();
      const salaCode = document.getElementById("sala").value.trim().toUpperCase();

      const { data: sala, error: salaError } = await supabase.from('salas').select('*').eq('codigo', salaCode).single();
      if (salaError || !sala) { alert("Sala não encontrada!"); return; }

      const { data: jogadores } = await supabase.from('jogadores').select('*').eq('codigo_sala', salaCode);
      const impostoresDistribuidos = jogadores.filter(j => j.role === "impostor").length;
      let role;

      if (impostoresDistribuidos < sala.impostores) {
        const remaining     = sala.quantidade - jogadores.length;
        const impostoresLeft = sala.impostores - impostoresDistribuidos;
        role = Math.random() < (impostoresLeft / remaining) ? "impostor" : "palavra";
      } else {
        role = "palavra";
      }

      const { error } = await supabase.from('jogadores').insert([{ nome, codigo_sala: salaCode, role }]);
      if (error) { alert("Erro ao entrar: " + error.message); return; }

      sessionStorage.setItem("impostor_sala", salaCode);
      sessionStorage.setItem("impostor_nome", nome);

      window.location.href = `jogo.html?codigo=${salaCode}&nome=${encodeURIComponent(nome)}`;
    });
  </script>
</body>
</html>
